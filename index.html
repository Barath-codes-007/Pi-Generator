<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>π Digit Generator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

    <h1>π Digit Generator</h1>

    <p class="subtitle">
        Generate π using a powerful Python backend
    </p>

    <div class="card">

        <label>Enter Number of Digits</label>

        <input
            type="number"
            id="digits"
            placeholder="Example: 1000">

        <button id="generateBtn">
            <i class="fa-solid fa-play"></i>
            Generate π
        </button>

        <div class="loading" id="loading">

            <div class="spinner"></div>

            <p>Calculating π...</p>

            <div class="progress-bar">

                <div class="progress" id="progress"></div>

            </div>

        </div>

        <div class="stats">

            <div>
                <h3>Digits</h3>
                <span id="digitCount">0</span>
            </div>

            <div>
                <h3>Time</h3>
                <span id="timeTaken">0 s</span>
            </div>

        </div>

        <textarea
            id="output"
            placeholder="Generated π will appear here..."
            readonly></textarea>

        <div class="buttons">

            <button id="copyBtn">
                <i class="fa-solid fa-copy"></i>
                Copy
            </button>

            <button id="txtBtn">
                <i class="fa-solid fa-file-lines"></i>
                Download TXT
            </button>

            <button id="pdfBtn">
                <i class="fa-solid fa-file-pdf"></i>
                Download PDF
            </button>

            <button id="themeBtn">
                <i class="fa-solid fa-moon"></i>
                Dark Mode
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
